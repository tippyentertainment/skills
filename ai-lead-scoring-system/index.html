<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lead Scoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div id="app" class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">AI Lead Scoring System</h1>
            <p class="text-gray-400 mt-2">Score leads 0-100 with actionable insights</p>
        </header>
        <div id="main-content" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-gray-800 rounded-xl p-6 shadow-xl">
                <h2 class="text-2xl font-semibold mb-4 text-blue-400">Add New Lead</h2>
                <form id="lead-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm text-gray-400 mb-1">Lead Name</label><input type="text" id="name" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="John Doe"></div>
                        <div><label class="block text-sm text-gray-400 mb-1">Email</label><input type="email" id="email" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="john@company.com"></div>
                    </div>
                    <div><label class="block text-sm text-gray-400 mb-1">Company</label><input type="text" id="company" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="Acme Inc"></div>
                    <div class="border-t border-gray-700 pt-4 mt-4">
                        <h3 class="text-lg font-medium text-purple-400 mb-3">Demographic Data</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm text-gray-400 mb-1">Industry</label><select id="industry" class="w-full bg-gray-700 rounded px-3 py-2 text-white"><option value="technology">Technology</option><option value="finance">Finance</option><option value="healthcare">Healthcare</option><option value="retail">Retail</option><option value="manufacturing">Manufacturing</option><option value="other">Other</option></select></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Company Size</label><select id="companySize" class="w-full bg-gray-700 rounded px-3 py-2 text-white"><option value="1-10">1-10</option><option value="11-50">11-50</option><option value="51-200">51-200</option><option value="201-500">201-500</option><option value="500+">500+</option></select></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Location</label><input type="text" id="location" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="San Francisco, CA"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Job Title</label><input type="text" id="jobTitle" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="VP of Engineering"></div>
                        </div>
                    </div>
                    <div class="border-t border-gray-700 pt-4 mt-4">
                        <h3 class="text-lg font-medium text-green-400 mb-3">Behavioral Data</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm text-gray-400 mb-1">Website Visits</label><input type="number" id="websiteVisits" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="0" min="0"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Page Views</label><input type="number" id="pageViews" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="0" min="0"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Time on Site (min)</label><input type="number" id="timeOnSite" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="0" min="0"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Last Visit (days ago)</label><input type="number" id="lastVisit" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="0" min="0"></div>
                        </div>
                    </div>
                    <div class="border-t border-gray-700 pt-4 mt-4">
                        <h3 class="text-lg font-medium text-yellow-400 mb-3">Engagement Data</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm text-gray-400 mb-1">Email Opens</label><input type="number" id="emailOpens" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="0" min="0"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Link Clicks</label><input type="number" id="linkClicks" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="0" min="0"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Form Submissions</label><input type="number" id="formSubmissions" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="0" min="0"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Webinar Attended</label><select id="webinarAttended" class="w-full bg-gray-700 rounded px-3 py-2 text-white"><option value="no">No</option><option value="yes">Yes</option></select></div>
                        </div>
                    </div>
                    <div class="border-t border-gray-700 pt-4 mt-4">
                        <h3 class="text-lg font-medium text-red-400 mb-3">Intent Signals</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm text-gray-400 mb-1">Pricing Page Visits</label><input type="number" id="pricingVisits" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="0" min="0"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Demo Requests</label><input type="number" id="demoRequests" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="0" min="0"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Trial Signups</label><input type="number" id="trialSignups" class="w-full bg-gray-700 rounded px-3 py-2 text-white" placeholder="0" min="0"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Competitor Comparison</label><select id="competitorComparison" class="w-full bg-gray-700 rounded px-3 py-2 text-white"><option value="no">No</option><option value="yes">Yes</option></select></div>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-semibold py-3 rounded-lg transition-all">Calculate Lead Score</button>
                </form>
            </div>
            <div class="bg-gray-800 rounded-xl p-6 shadow-xl">
                <h2 class="text-2xl font-semibold mb-4 text-blue-400">Lead Score Results</h2>
                <div id="results" class="space-y-6"><div class="text-center text-gray-500 py-12"><p>Enter lead data and click "Calculate Lead Score" to see results</p></div></div>
            </div>
        </div>
        <div id="dashboard" class="mt-8 bg-gray-800 rounded-xl p-6 shadow-xl">
            <h2 class="text-2xl font-semibold mb-4 text-blue-400">Lead Dashboard</h2>
            <div id="leads-list" class="space-y-4"><p class="text-gray-500 text-center py-8">No leads scored yet. Add your first lead above.</p></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
